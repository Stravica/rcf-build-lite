name: publish
on:
  push:
    tags: ['v*']
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      # npm performs the publish step: trusted publishing (OIDC) requires npm >= 11.5.1
      # (bundled with current Node 24 releases); pnpm 9 predates OIDC support in pnpm.
      # First publish authenticates with a short-lived granular token (npm cannot bind
      # a trusted publisher to a never-published package). Once 0.1.0 is live the
      # trusted publisher is bound on npmjs.com, the token is deleted, and this env
      # line is removed - provenance signing uses the workflow OIDC token either way.
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
