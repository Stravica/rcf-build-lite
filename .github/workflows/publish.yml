name: publish
# Tag-driven, per-package publishing for the rcf-lite monorepo.
#
# Each package publishes INDEPENDENTLY under its own prefixed tag; the prefix
# selects the package and a wrong tag can never publish the wrong one:
#   build-v<version>   -> packages/build   (@stravica-ai/rcf-build-lite)
#   verify-v<version>  -> packages/verify  (@stravica-ai/rcf-verify-lite)
#   core-v<version>    -> packages/core    (@stravica-ai/rcf-lite-core)
#
# The trusted-publisher (OIDC) binding is repo + workflow FILENAME (this file),
# not path — every package's binding maps to this same `publish.yml`, so the
# tag-prefix switch below stays within the bound workflow and keeps provenance.
# (The prior single-package shape triggered on `v*` and hardcoded packages/build;
# that glob would also have matched `verify-v*`, publishing the wrong package —
# the prefixed scheme + version-match guard closes that footgun.)
on:
  push:
    tags:
      - 'build-v*'
      - 'verify-v*'
      - 'core-v*'
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4.4.0
        with:
          version: 9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org/'
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r test
      - name: Resolve package from tag
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"
          case "$TAG" in
            build-v*)  DIR="packages/build";  NAME="@stravica-ai/rcf-build-lite"; VERSION="${TAG#build-v}" ;;
            verify-v*) DIR="packages/verify"; NAME="@stravica-ai/rcf-verify-lite"; VERSION="${TAG#verify-v}" ;;
            core-v*)   DIR="packages/core";   NAME="@stravica-ai/rcf-lite-core";  VERSION="${TAG#core-v}" ;;
            *) echo "::error::Unrecognised release tag '$TAG' — expected build-v* / verify-v* / core-v*"; exit 1 ;;
          esac
          # Guard: the package.json version MUST equal the tag's version. A wrong
          # tag, or a tag pushed without the matching version bump, can never
          # publish. This is the hard "wrong tag never publishes" backstop.
          PKG_VERSION="$(node -p "require('./$DIR/package.json').version")"
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "::error::Tag version '$VERSION' does not match $DIR/package.json version '$PKG_VERSION'"; exit 1
          fi
          # Prerelease detection runs on VERSION (the post-prefix part), never the
          # raw tag — the tag always contains a '-' inside its '<name>-v' prefix.
          # A '-' in the version (e.g. 0.2.2-rebind-test.0) -> 'prerelease' dist-tag
          # so a prerelease can never clobber 'latest'; a plain version -> 'latest'.
          case "$VERSION" in
            *-*) DIST="prerelease" ;;
            *)   DIST="latest" ;;
          esac
          {
            echo "dir=$DIR"
            echo "name=$NAME"
            echo "version=$VERSION"
            echo "dist=$DIST"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved $NAME@$VERSION from $DIR -> dist-tag '$DIST'"
      # Publish via `pnpm publish` (not `npm publish`): the build and verify
      # packages depend on @stravica-ai/rcf-lite-core via `workspace:*`, and pnpm
      # rewrites that protocol to the resolved version at pack time. `npm publish`
      # does NOT rewrite `workspace:*`, so it would ship a literal, unresolvable
      # spec to consumers (spec §7.5 armed-footgun). `--provenance` keeps
      # provenance / trusted publishing (OIDC). `--no-git-checks` because a tag
      # build is a detached HEAD.
      - name: Publish package
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: |
          if [ "${{ steps.pkg.outputs.dist }}" = "prerelease" ]; then
            echo "Prerelease version (${{ steps.pkg.outputs.version }}) -> publishing under dist-tag 'prerelease'"
            pnpm publish --provenance --access public --tag prerelease --no-git-checks
          else
            echo "Release version (${{ steps.pkg.outputs.version }}) -> publishing under default dist-tag 'latest'"
            pnpm publish --provenance --access public --no-git-checks
          fi
